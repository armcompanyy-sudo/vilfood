<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#231C16" />
    <meta
      name="description"
      content="Vilfood — natural Armenian fruit & vegetable preserves from Hrazdan since 2007. Compotes, jams, vegetable preserves and more. Sunlight, sealed."
    />
    <meta property="og:title" content="Vilfood — Sunlight, sealed since 2007" />
    <meta
      property="og:description"
      content="Natural Armenian fruit & vegetable preserves, made the traditional way in Hrazdan since 2007."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vilfood.vercel.app/" />
    <meta property="og:image" content="https://vilfood.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://vilfood.vercel.app/og-image.jpg" />

    <!-- Preload the hero video poster (LCP) so the first frame paints instantly. -->
    <link rel="preload" as="image" href="/img/hero-video-poster.webp" type="image/webp" fetchpriority="high" />

    <!-- Boot placeholder: paint the hero scene the instant the HTML arrives, so
         there is no blank/cream flash while the JS bundle loads and React
         mounts. The real hero (same poster + video) replaces it seamlessly. -->
    <style>
      #hero-boot {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: #f4ede1 url("/img/hero-video-poster.webp") 50% 58% / cover no-repeat;
      }
      /* left cream wash on desktop, soft overall wash on mobile — matches the
         real hero's legibility scrims so the swap is invisible */
      #hero-boot::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(244, 237, 225, 0.78) 0%,
          rgba(244, 237, 225, 0.5) 32%,
          rgba(244, 237, 225, 0.72) 72%,
          #f4ede1 100%
        );
      }
      @media (min-width: 768px) {
        #hero-boot::after {
          background: linear-gradient(
            100deg,
            rgba(244, 237, 225, 0.97) 0%,
            rgba(244, 237, 225, 0.9) 26%,
            rgba(244, 237, 225, 0.55) 44%,
            rgba(244, 237, 225, 0.12) 60%,
            transparent 72%
          );
        }
      }
    </style>

    <!-- Fonts: Fraunces (display) + Hanken Grotesk (UI/body); Noto + Playfair are
         per-glyph fallbacks for HY/RU (loaded only when those glyphs appear).
         Loaded asynchronously (media=print → all) so they never block first paint;
         display=swap shows fallback text immediately, then swaps. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400..700;1,400..600&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Sans+Armenian:wght@400;500;700&family=Noto+Serif+Armenian:wght@500;700&family=Noto+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400..700;1,400..600&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Sans+Armenian:wght@400;500;700&family=Noto+Serif+Armenian:wght@500;700&family=Noto+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400..700;1,400..600&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Sans+Armenian:wght@400;500;700&family=Noto+Serif+Armenian:wght@500;700&family=Noto+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
      />
    </noscript>

    <title>Vilfood — Sunlight, sealed since 2007</title>
  </head>
  <body>
    <div id="root"><div id="hero-boot"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
